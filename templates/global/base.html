<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - {% block title %} {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.10"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">    
</head>
<body class="flex flex-col justify-center items-center min-h-screen">
    {% include 'global/modal.html' %}
    {% block content %} {% endblock %}
    <script src="{% static 'script/modal.js' %}"></script>
</body>
</html>
